name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    name: Deploy Worker
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID || secrets.ACCOUNT_ID }}
      W7S_ZONE_NAME: ${{ vars.W7S_ZONE_NAME || 'w7s.cloud' }}
      W7S_DEPLOYMENTS_KV_NAME: ${{ vars.W7S_DEPLOYMENTS_KV_NAME || 'w7s-io-deployments' }}
      W7S_STATIC_ASSETS_BUCKET: ${{ vars.W7S_STATIC_ASSETS_BUCKET || 'w7s-io-static-assets' }}
      W7S_DISPATCH_NAMESPACE: ${{ vars.W7S_DISPATCH_NAMESPACE || 'w7s-isolate' }}
      W7S_ATTACH_WILDCARD_ROUTE: ${{ vars.W7S_ATTACH_WILDCARD_ROUTE || 'false' }}
      W7S_COMPATIBILITY_DATE: ${{ vars.W7S_COMPATIBILITY_DATE || '2026-05-23' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check
        run: npm run check

      - name: Capture deployment metadata
        run: |
          echo "W7S_DEPLOY_BRANCH=${GITHUB_REF_NAME}" >> "$GITHUB_ENV"
          echo "W7S_DEPLOYED_AT=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_ENV"

      - name: Prepare Cloudflare config
        run: npm run prepare:cloudflare

      - name: Deploy
        run: npx wrangler deploy --config wrangler.generated.jsonc --secrets-file .wrangler/secrets.json

      - name: Reconcile routes
        run: npm run reconcile:cloudflare-routes
